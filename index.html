<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Larry's Health Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080c12; font-family: 'Inter', system-ui, sans-serif; color: #00ff7f; }
  input[type=time]::-webkit-calendar-picker-indicator { filter: invert(1) brightness(0.5) sepia(1) hue-rotate(80deg); }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1) brightness(0.5) sepia(1) hue-rotate(80deg); }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #080c12; } ::-webkit-scrollbar-thumb { background: #1a2235; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const MED_SECTIONS = [
  { key:"rx", label:"Prescription Medications", color:"#f472b6",
    meds:[
      {name:"Tramadol",defaultDose:"50mg"},
      {name:"Adderall",defaultDose:"20mg"},
      {name:"Ambien",defaultDose:"10mg"},
      {name:"Sildenafil",defaultDose:"100mg"},
    ]
  },
  { key:"otc", label:"Non-Prescription", color:"#38bdf8",
    meds:[
      {name:"Unisom",defaultDose:"50mg"},
      {name:"Magnesium",defaultDose:"400mg"},
      {name:"Magnesium Glycinate",defaultDose:"400mg"},
      {name:"Magnesium L-Threonate",defaultDose:"144mg"},
      {name:"Vitamin B-12",defaultDose:"1000mcg"},
      {name:"Iron",defaultDose:"65mg"},
      {name:"Zinc",defaultDose:"50mg"},
      {name:"Vitamin C",defaultDose:"1000mg"},
      {name:"L-Arginine",defaultDose:"1000mg"},
      {name:"L-Carnitine",defaultDose:"500mg"},
    ]
  }
];
const MEDS = MED_SECTIONS.flatMap(s => s.meds);
const SLEEP_LOCATIONS = ["My House","Elizabeth's House","Hotel"];
const COMPANY = ["Alone","With Elizabeth"];

function todayKey(){return new Date().toISOString().split("T")[0];}
function fmtDate(d){return new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}
function avg(arr){if(!arr.length)return null;return arr.reduce((a,b)=>a+b,0)/arr.length;}
function fmtAvg(n){return n==null?"—":n.toFixed(1);}
const SCORE_COLOR=s=>{if(s>=80)return"#22d3ee";if(s>=60)return"#a78bfa";if(s>=40)return"#fbbf24";return"#f87171";};

function App(){
  const [tab,setTab]=useState("log");
  const [logs,setLogs]=useState({});
  const [saved,setSaved]=useState(false);
  const [analysisTab,setAnalysisTab]=useState("meds");
  const [selectedDate,setSelectedDate]=useState(todayKey());
  const [selectedMeds,setSelectedMeds]=useState({});
  const [workout,setWorkout]=useState(null);
  const [calories,setCalories]=useState(null);
  const [location,setLocation]=useState(null);
  const [company,setCompany]=useState(null);
  const [exerciseType,setExerciseType]=useState(null);
  const [exerciseDuration,setExerciseDuration]=useState("");
  const [sleepScore,setSleepScore]=useState(null);
  const [sleepDuration,setSleepDuration]=useState("");
  const [sleepTime,setSleepTime]=useState("");

  useEffect(()=>{
    const s=localStorage.getItem("hlth-logs");
    if(s){const p=JSON.parse(s);setLogs(p);if(p[selectedDate])hydrate(p[selectedDate]);else resetForm();}
  },[]);

  useEffect(()=>{
    if(logs[selectedDate])hydrate(logs[selectedDate]);else resetForm();
  },[selectedDate]);

  const resetForm=()=>{setSelectedMeds({});setWorkout(null);setCalories(null);setExerciseType(null);setExerciseDuration("");setLocation(null);setCompany(null);setSleepScore(null);setSleepDuration("");setSleepTime("");};

  const hydrate=e=>{
    setSelectedMeds(e.meds||{});setWorkout(e.workout??null);setCalories(e.calories??null);
    setExerciseType(e.exerciseType==="Weights"?"Strength Training":(e.exerciseType??null));setExerciseDuration(e.exerciseDuration??"");
    setLocation(e.location??null);setCompany(e.company??null);
    setSleepScore(e.sleepScore??null);setSleepDuration(e.sleepDuration??"");setSleepTime(e.sleepTime??"");
  };

  const adjustedMeds=meds=>{
    const r={};
    Object.entries(meds).forEach(([n,v])=>{
      if(!v?.on){r[n]=v;return;}
      const doses=(v.doses||[]).map(d=>{if(!d.time)return d;const[h]=d.time.split(":").map(Number);return{...d,countsForPriorNight:h<6};});
      r[n]={...v,doses};
    });
    return r;
  };

  const save=()=>{
    const entry={meds:adjustedMeds(selectedMeds),workout,calories,exerciseType,exerciseDuration,location,company,sleepScore,sleepDuration,sleepTime};
    const updated={...logs,[selectedDate]:entry};
    setLogs(updated);localStorage.setItem("hlth-logs",JSON.stringify(updated));
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const toggleMed=name=>{
    setSelectedMeds(prev=>{
      const exists=prev[name]?.on;
      const defaultDose=MEDS.find(m=>m.name===name)?.defaultDose||"";
      return{...prev,[name]:{on:!exists,doses:prev[name]?.doses||[{dose:defaultDose,time:""}]}};
    });
  };

  const entries=Object.entries(logs).filter(([,v])=>v.sleepScore!=null);
  const corrMed=n=>{const w=entries.filter(([,v])=>v.meds?.[n]?.on).map(([,v])=>v.sleepScore);const wo=entries.filter(([,v])=>!v.meds?.[n]?.on).map(([,v])=>v.sleepScore);if(w.length<2||wo.length<1)return null;return{with_:fmtAvg(avg(w)),without_:fmtAvg(avg(wo)),diff:(avg(w)-avg(wo)).toFixed(1),n:w.length};};
  const corrBool=(f,tl,fl)=>{const w=entries.filter(([,v])=>v[f]===true).map(([,v])=>v.sleepScore);const wo=entries.filter(([,v])=>v[f]===false).map(([,v])=>v.sleepScore);if(w.length<2||wo.length<1)return null;return{with_:fmtAvg(avg(w)),without_:fmtAvg(avg(wo)),diff:(avg(w)-avg(wo)).toFixed(1),n:w.length,tl,fl};};
  const corrCat=(f,opts)=>opts.map(o=>{const m=entries.filter(([,v])=>v[f]===o).map(([,v])=>v.sleepScore);const ot=entries.filter(([,v])=>v[f]&&v[f]!==o).map(([,v])=>v.sleepScore);if(m.length<2||ot.length<1)return null;return{label:o,avg_:fmtAvg(avg(m)),diff:(avg(m)-avg(ot)).toFixed(1),n:m.length};}).filter(Boolean);
  const corrDuration=()=>{const p=entries.filter(([,v])=>parseFloat(v.sleepDuration)>0).map(([,v])=>({dur:parseFloat(v.sleepDuration),score:v.sleepScore}));if(p.length<4)return null;const s=p.filter(x=>x.dur<6).map(x=>x.score),m=p.filter(x=>x.dur>=6&&x.dur<8).map(x=>x.score),l=p.filter(x=>x.dur>=8).map(x=>x.score);return[{label:"< 6 hrs",avg_:fmtAvg(avg(s)),n:s.length},{label:"6–8 hrs",avg_:fmtAvg(avg(m)),n:m.length},{label:"> 8 hrs",avg_:fmtAvg(avg(l)),n:l.length}].filter(r=>r.n>0);};
  const corrSleepTime=()=>{const p=entries.filter(([,v])=>v.sleepTime).map(([,v])=>{const[h]=v.sleepTime.split(":").map(Number);return{h:h<12?h+24:h,score:v.sleepScore};});if(p.length<4)return null;const e=p.filter(x=>x.h<22).map(x=>x.score),n=p.filter(x=>x.h>=22&&x.h<24).map(x=>x.score),l=p.filter(x=>x.h>=24).map(x=>x.score);return[{label:"Before 10pm",avg_:fmtAvg(avg(e)),n:e.length},{label:"10pm–midnight",avg_:fmtAvg(avg(n)),n:n.length},{label:"After midnight",avg_:fmtAvg(avg(l)),n:l.length}].filter(r=>r.n>0);};

  const recentLogs=Object.entries(logs).sort(([a],[b])=>b.localeCompare(a)).slice(0,30);

  const bg="#080c12",surface="#0f1520",border="#1a2235",accent="#00ff7f",accent2="#39ff14",muted="#00cc66",text="#00ff7f",textMuted="#00aa55";
  const card={background:surface,borderRadius:14,border:`1px solid ${border}`,padding:"16px",marginBottom:12};
  const lbl={fontSize:13,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#00cc66",marginBottom:10,display:"block"};
  const chipBase={padding:"9px 16px",borderRadius:20,fontSize:14,cursor:"pointer",transition:"all 0.15s",fontWeight:500,border:"1.5px solid"};

  const Chip=({active,onClick,children,color})=>(
    <button onClick={onClick} style={{...chipBase,borderColor:active?(color||accent):border,background:active?`${color||accent}18`:"transparent",color:active?(color||accent):muted}}>{children}</button>
  );

  const Bar=({label:l,avg_,diff,n,color})=>{
    const score=parseFloat(avg_),pct=isNaN(score)?0:(score/100)*100;
    const pos=diff!=null&&parseFloat(diff)>=0;
    return(
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
          <span style={{fontSize:14,color:text}}>{l}</span>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:15,fontWeight:700,color:SCORE_COLOR(score)}}>{avg_}</span>
            {diff!=null&&<span style={{fontSize:13,fontWeight:700,color:pos?"#22d3ee":"#f87171"}}>{pos?"+":""}{diff}</span>}
            <span style={{fontSize:13,color:textMuted}}>({n}n)</span>
          </div>
        </div>
        <div style={{background:border,borderRadius:4,height:5,overflow:"hidden"}}>
          <div style={{width:`${pct}%`,height:"100%",background:color||SCORE_COLOR(score),borderRadius:4}}/>
        </div>
      </div>
    );
  };

  const Empty=({icon,msg})=>(
    <div style={{textAlign:"center",padding:"48px 20px"}}>
      <div style={{fontSize:36,marginBottom:12}}>{icon}</div>
      <div style={{color:textMuted,fontSize:14,lineHeight:1.7,whiteSpace:"pre-line"}}>{msg}</div>
    </div>
  );

  const prevDay=()=>{const d=new Date(selectedDate+"T12:00:00");d.setDate(d.getDate()-1);setSelectedDate(d.toISOString().split("T")[0]);};
  const nextDay=()=>{const d=new Date(selectedDate+"T12:00:00");d.setDate(d.getDate()+1);const n=d.toISOString().split("T")[0];if(n<=todayKey())setSelectedDate(n);};

  return(
    <div style={{background:bg,minHeight:"100vh",color:text,fontFamily:"'Inter',system-ui,sans-serif",maxWidth:440,margin:"0 auto",paddingBottom:80}}>

      {/* Header */}
      <div style={{padding:"28px 20px 0"}}>
        <div style={{fontSize:12,letterSpacing:"0.2em",color:textMuted,textTransform:"uppercase",marginBottom:4}}>Daily Health Log</div>
        <div style={{fontSize:30,fontWeight:800,color:text,letterSpacing:"-0.5px"}}>Larry's Tracker</div>
        <div style={{height:2,background:"linear-gradient(90deg,#00ff7f,#39ff14,transparent)",marginTop:14,borderRadius:2}}/>
      </div>

      {/* Nav */}
      <div style={{display:"flex",padding:"0 20px",gap:4,marginTop:16,marginBottom:4}}>
        {[["log","Log"],["history","History"],["insights","Insights"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:"10px 0",background:tab===v?`${accent}15`:"transparent",border:`1px solid ${tab===v?accent:border}`,borderRadius:8,color:tab===v?accent:textMuted,fontSize:15,fontWeight:tab===v?700:400,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>

      {/* ── LOG ── */}
      {tab==="log"&&(
        <div style={{padding:"16px 20px"}}>
          {/* Date picker */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
            <button onClick={prevDay} style={{background:border,border:`1px solid ${muted}`,borderRadius:8,color:text,fontSize:18,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <div style={{flex:1,textAlign:"center"}}>
              <input type="date" value={selectedDate} max={todayKey()} onChange={e=>setSelectedDate(e.target.value)} style={{background:"transparent",border:"none",color:accent,fontSize:16,fontWeight:700,cursor:"pointer",outline:"none",textAlign:"center",width:"100%"}}/>
              {selectedDate===todayKey()?<div style={{fontSize:12,color:textMuted,marginTop:2}}>Today</div>:<div style={{fontSize:12,color:"#f59e0b",marginTop:2}}>Historical Entry</div>}
            </div>
            <button onClick={nextDay} style={{background:border,border:`1px solid ${selectedDate===todayKey()?border:muted}`,borderRadius:8,color:selectedDate===todayKey()?border:text,fontSize:18,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>

          {/* Medication sections */}
          {MED_SECTIONS.map(section=>(
            <div key={section.key} style={{...card,marginBottom:16}}>
              <div style={{borderBottom:"2px solid #00ff7f",paddingBottom:10,marginBottom:16}}>
                <span style={{fontSize:16,fontWeight:800,color:"#00ff7f",letterSpacing:"0.08em",textTransform:"uppercase"}}>{section.label}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {section.meds.map(m=>{
                  const sel=selectedMeds[m.name],isOn=sel?.on,doses=sel?.doses||[{dose:m.defaultDose,time:""}];
                  const lastTime=doses.filter(d=>d.time).map(d=>d.time).sort().reverse()[0];
                  return(
                    <div key={m.name} style={{borderBottom:`1px solid ${border}`,paddingBottom:12}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <button onClick={()=>toggleMed(m.name)} style={{width:24,height:24,borderRadius:6,border:`1.5px solid ${isOn?section.color:border}`,background:isOn?section.color:"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {isOn&&<span style={{color:bg,fontSize:14,fontWeight:900}}>✓</span>}
                        </button>
                        <span style={{fontSize:16,color:isOn?section.color:"#4a7a5a",flex:1,fontWeight:isOn?700:400}}>{m.name}</span>
                        {isOn&&<span style={{fontSize:13,color:textMuted}}>{doses.length}x {lastTime?`· last ${lastTime}`:""}</span>}
                      </div>
                      {isOn&&(
                        <div style={{marginTop:10,marginLeft:34}}>
                          {doses.map((d,i)=>(
                            <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:10}}>
                              <div style={{fontSize:13,color:textMuted,minWidth:20,paddingTop:10}}>#{i+1}</div>
                              <div style={{flex:1}}>
                                <div style={{fontSize:11,color:textMuted,marginBottom:3}}>DOSE</div>
                                <input value={d.dose} onChange={e=>{const u=[...doses];u[i]={...u[i],dose:e.target.value};setSelectedMeds(p=>({...p,[m.name]:{...p[m.name],doses:u}}));}} placeholder={m.defaultDose} style={{width:"100%",background:border,border:`1px solid ${section.color}40`,borderRadius:6,padding:"8px 10px",color:text,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
                              </div>
                              <div style={{flex:1}}>
                                <div style={{fontSize:11,color:textMuted,marginBottom:3}}>TIME</div>
                                <input type="time" value={d.time} onChange={e=>{const u=[...doses];u[i]={...u[i],time:e.target.value};setSelectedMeds(p=>({...p,[m.name]:{...p[m.name],doses:u}}));}} style={{width:"100%",background:border,border:`1px solid ${section.color}40`,borderRadius:6,padding:"8px 10px",color:text,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
                                {d.time&&parseInt(d.time.split(":")[0])<6&&<div style={{fontSize:12,color:"#f59e0b",marginTop:2}}>🌙 prior night</div>}
                              </div>
                              <button onClick={()=>{const u=doses.filter((_,idx)=>idx!==i);if(u.length===0){setSelectedMeds(p=>({...p,[m.name]:{on:false,doses:[{dose:m.defaultDose,time:""}]}}));}else{setSelectedMeds(p=>({...p,[m.name]:{...p[m.name],doses:u}}));}}} style={{background:"none",border:"none",color:"#f87171",fontSize:20,cursor:"pointer",padding:"8px 4px"}}>×</button>
                            </div>
                          ))}
                          <button onClick={()=>{const u=[...doses,{dose:m.defaultDose,time:""}];setSelectedMeds(p=>({...p,[m.name]:{...p[m.name],doses:u}}));}} style={{background:"none",border:`1px dashed ${section.color}60`,borderRadius:6,color:section.color,fontSize:13,padding:"6px 14px",cursor:"pointer",marginTop:2}}>+ Add dose</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}

          {/* Lifestyle */}
          <div style={card}>
            <div style={{borderBottom:"2px solid #00ff7f",paddingBottom:10,marginBottom:16}}>
              <span style={{fontSize:16,fontWeight:800,color:"#00ff7f",letterSpacing:"0.08em",textTransform:"uppercase"}}>Lifestyle</span>
            </div>
            <span style={lbl}>Did You Exercise?</span>
            <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
              <Chip active={workout===true} onClick={()=>setWorkout(workout===true?null:true)} color="#22d3ee">✓ Worked Out</Chip>
              <Chip active={workout===false} onClick={()=>setWorkout(workout===false?null:false)} color="#f87171">✗ Rest Day</Chip>
            </div>
            {workout===true&&(
              <>
                <span style={lbl}>Exercise Type</span>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
                  {["Cardio","Strength Training","Volleyball","HIIT","Yoga","Walk","Swim","Cycling","Other"].map(t=>(
                    <Chip key={t} active={exerciseType===t} onClick={()=>setExerciseType(exerciseType===t?null:t)} color="#22d3ee">{t}</Chip>
                  ))}
                </div>
                <span style={lbl}>Duration (minutes)</span>
                <input type="number" min="0" max="300" value={exerciseDuration} onChange={e=>setExerciseDuration(e.target.value)} placeholder="45" style={{width:"100%",background:border,border:`1px solid ${muted}`,borderRadius:8,padding:"10px 14px",color:text,fontSize:16,outline:"none",boxSizing:"border-box",marginBottom:16}}/>
              </>
            )}
            <span style={lbl}>Calories Burned</span>
            <div style={{display:"flex",gap:8}}>
              <Chip active={calories===true} onClick={()=>setCalories(calories===true?null:true)} color="#22d3ee">Over 3,000</Chip>
              <Chip active={calories===false} onClick={()=>setCalories(calories===false?null:false)} color={accent2}>Under 3,000</Chip>
            </div>
          </div>

          {/* Sleep Location */}
          <div style={card}>
            <div style={{borderBottom:"2px solid #00ff7f",paddingBottom:10,marginBottom:16}}>
              <span style={{fontSize:16,fontWeight:800,color:"#00ff7f",letterSpacing:"0.08em",textTransform:"uppercase"}}>Sleep Environment</span>
            </div>
            <span style={lbl}>Where Did You Sleep?</span>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
              {SLEEP_LOCATIONS.map(l=><Chip key={l} active={location===l} onClick={()=>setLocation(location===l?null:l)} color="#fbbf24">{l}</Chip>)}
            </div>
            <span style={lbl}>Who Were You With?</span>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {COMPANY.map(c=><Chip key={c} active={company===c} onClick={()=>setCompany(company===c?null:c)} color="#f472b6">{c}</Chip>)}
            </div>
          </div>

          {/* Sleep Data */}
          <div style={card}>
            <div style={{borderBottom:"2px solid #00ff7f",paddingBottom:10,marginBottom:16}}>
              <span style={{fontSize:16,fontWeight:800,color:"#00ff7f",letterSpacing:"0.08em",textTransform:"uppercase"}}>Sleep Data</span>
              <div style={{fontSize:12,color:textMuted,marginTop:4,textTransform:"none",letterSpacing:"normal",fontWeight:400}}>For the night following this date — come back and fill in tomorrow morning when your Fitbit results are in.</div>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:13,color:textMuted,marginBottom:8}}>Sleep Score (1–100)</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <input type="number" min="1" max="100" value={sleepScore||""} onChange={e=>setSleepScore(e.target.value?parseInt(e.target.value):null)} placeholder="e.g. 78" style={{flex:1,background:border,border:`1px solid ${muted}`,borderRadius:8,padding:"12px 14px",color:sleepScore?SCORE_COLOR(sleepScore):text,fontSize:22,fontWeight:700,outline:"none",boxSizing:"border-box",textAlign:"center"}}/>
                {sleepScore&&<div style={{fontSize:28,fontWeight:800,color:SCORE_COLOR(sleepScore),minWidth:60,textAlign:"center"}}>{sleepScore}<span style={{fontSize:13,color:textMuted}}>/100</span></div>}
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:textMuted,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.08em"}}>Duration</div>
                <div style={{display:"flex",gap:4}}>
                  <div style={{flex:1}}>
                    <input type="number" min="0" max="24" value={sleepDuration.split("h")[0]||""} onChange={e=>{const h=e.target.value,m=sleepDuration.includes("h")?sleepDuration.split("h")[1]?.replace("m","")||"0":"0";setSleepDuration(`${h}h${m}m`);}} placeholder="7" style={{width:"100%",background:border,border:`1px solid ${muted}`,borderRadius:6,padding:"10px 6px",color:text,fontSize:15,outline:"none",boxSizing:"border-box",textAlign:"center"}}/>
                    <div style={{fontSize:13,color:textMuted,textAlign:"center",marginTop:2}}>hrs</div>
                  </div>
                  <div style={{flex:1}}>
                    <input type="number" min="0" max="59" value={sleepDuration.includes("h")?sleepDuration.split("h")[1]?.replace("m","")||"":""} onChange={e=>{const m=e.target.value,h=sleepDuration.includes("h")?sleepDuration.split("h")[0]||"0":"0";setSleepDuration(`${h}h${m}m`);}} placeholder="30" style={{width:"100%",background:border,border:`1px solid ${muted}`,borderRadius:6,padding:"10px 6px",color:text,fontSize:15,outline:"none",boxSizing:"border-box",textAlign:"center"}}/>
                    <div style={{fontSize:13,color:textMuted,textAlign:"center",marginTop:2}}>min</div>
                  </div>
                </div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:textMuted,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.08em"}}>Time Fell Asleep</div>
                <input type="time" value={sleepTime} onChange={e=>setSleepTime(e.target.value)} style={{width:"100%",background:border,border:`1px solid ${muted}`,borderRadius:6,padding:"10px 12px",color:text,fontSize:15,outline:"none",boxSizing:"border-box"}}/>
              </div>
            </div>
          </div>

          <button onClick={save} style={{width:"100%",padding:"15px",background:saved?"#065f46":"linear-gradient(135deg,#00ff7f,#39ff14)",border:"none",borderRadius:12,color:saved?"#6ee7b7":"#080c12",fontSize:16,fontWeight:800,cursor:"pointer",marginBottom:10}}>
            {saved?"✓ Saved!":"Save Today's Log"}
          </button>
          {logs[selectedDate]&&(
            <button onClick={()=>{if(window.confirm(`Delete the saved entry for ${fmtDate(selectedDate)}? This can't be undone.`)){const updated={...logs};delete updated[selectedDate];setLogs(updated);localStorage.setItem("hlth-logs",JSON.stringify(updated));resetForm();}}} style={{width:"100%",padding:"13px",background:"transparent",border:"1.5px solid #f87171",borderRadius:12,color:"#f87171",fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:20}}>
              🗑 Delete This Day's Entry
            </button>
          )}
        </div>
      )}

      {/* ── HISTORY ── */}
      {tab==="history"&&(
        <div style={{padding:"16px 20px"}}>
          {recentLogs.length===0?<Empty icon="📋" msg="No logs yet. Start tracking today!"/>:recentLogs.map(([date,entry])=>(
            <div key={date} style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:15,fontWeight:700,color:text}}>{fmtDate(date)}</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {entry.sleepScore!=null&&<span style={{fontSize:18,fontWeight:800,color:SCORE_COLOR(entry.sleepScore)}}>{entry.sleepScore}<span style={{fontSize:12,color:textMuted}}>/100</span></span>}
                  {entry.sleepDuration&&<span style={{fontSize:13,color:textMuted}}>{entry.sleepDuration}</span>}
                  <button onClick={()=>{setSelectedDate(date);setTab("log");}} style={{background:"none",border:`1px solid ${accent}60`,borderRadius:8,color:accent,fontSize:13,padding:"5px 12px",cursor:"pointer",fontWeight:600}}>Edit</button>
                </div>
              </div>
              {Object.entries(entry.meds||{}).filter(([,v])=>v?.on).length>0&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                  {Object.entries(entry.meds).filter(([,v])=>v?.on).map(([name,val])=>{
                    const doses=val.doses||[];
                    const lastTime=doses.filter(d=>d.time).map(d=>d.time).sort().reverse()[0];
                    return(<span key={name} style={{background:`${accent}18`,border:`1px solid ${accent}40`,borderRadius:10,padding:"3px 8px",fontSize:12,color:accent}}>
                      {name}{doses.length>1?` ×${doses.length}`:doses[0]?.dose?` ${doses[0].dose}`:""}{lastTime?` · ${lastTime}`:""}{doses.some(d=>d.countsForPriorNight)?" 🌙":""}
                    </span>);
                  })}
                </div>
              )}
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                {entry.workout===true&&<span style={{fontSize:13,color:"#22d3ee"}}>💪 {entry.exerciseType||"Workout"}{entry.exerciseDuration?` ${entry.exerciseDuration}min`:""}</span>}
                {entry.workout===false&&<span style={{fontSize:13,color:textMuted}}>Rest day</span>}
                {entry.calories===true&&<span style={{fontSize:13,color:"#22d3ee"}}>🔥 3000+ cal</span>}
                {entry.location&&<span style={{fontSize:13,color:"#fbbf24"}}>🏠 {entry.location}</span>}
                {entry.company&&<span style={{fontSize:13,color:"#f472b6"}}>{entry.company==="Alone"?"🧍":"👫"} {entry.company}</span>}
                {entry.sleepTime&&<span style={{fontSize:13,color:textMuted}}>😴 {entry.sleepTime}</span>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── INSIGHTS ── */}
      {tab==="insights"&&(
        <div style={{padding:"16px 20px"}}>
          {entries.length<3?<Empty icon="📊" msg={`Log at least 3 nights with a sleep score to unlock insights.\n\nYou have ${entries.length} so far.`}/>:(
            <>
              <div style={{fontSize:13,color:textMuted,marginBottom:14}}>Based on {entries.length} nights of data.</div>
              <div style={{display:"flex",gap:4,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
                {[["meds","Meds"],["lifestyle","Lifestyle"],["timing","Timing"],["location","Location"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setAnalysisTab(v)} style={{padding:"8px 12px",borderRadius:8,border:`1px solid ${analysisTab===v?accent2:border}`,background:analysisTab===v?`${accent2}15`:"transparent",color:analysisTab===v?accent2:textMuted,fontSize:13,fontWeight:analysisTab===v?700:400,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{l}</button>
                ))}
              </div>

              {analysisTab==="meds"&&(
                <div style={card}>
                  <span style={lbl}>Medication vs Sleep Score</span>
                  <div style={{fontSize:13,color:textMuted,marginBottom:14}}>Avg score on nights you took each med vs nights you didn't.</div>
                  {MEDS.map(m=>{const c=corrMed(m.name);if(!c)return null;return(
                    <div key={m.name} style={{marginBottom:16}}>
                      <div style={{fontSize:15,fontWeight:600,color:text,marginBottom:8}}>{m.name}</div>
                      <Bar label="Took it" avg_={c.with_} diff={c.diff} n={c.n} color={accent}/>
                      <Bar label="Didn't take" avg_={c.without_} n={entries.length-c.n}/>
                    </div>
                  );})}
                  {MEDS.every(m=>!corrMed(m.name))&&<div style={{color:textMuted,fontSize:13}}>Need more nights with each medication logged.</div>}
                </div>
              )}

              {analysisTab==="lifestyle"&&(
                <>
                  {(()=>{const c=corrBool("workout");return c?(<div style={card}><span style={lbl}>Workout vs Sleep</span><Bar label="Worked out" avg_={c.with_} diff={c.diff} n={c.n} color="#22d3ee"/><Bar label="Rest day" avg_={c.without_} n={entries.filter(([,v])=>v.workout===false).length} color={muted}/></div>):null;})()}
                  {(()=>{const c=corrBool("calories");return c?(<div style={card}><span style={lbl}>Calories Burned vs Sleep</span><Bar label="Over 3,000 cal" avg_={c.with_} diff={c.diff} n={c.n} color="#f59e0b"/><Bar label="Under 3,000 cal" avg_={c.without_} n={entries.filter(([,v])=>v.calories===false).length} color={muted}/></div>):null;})()}
                  {(()=>{const c=corrCat("company",COMPANY);return c.length?(<div style={card}><span style={lbl}>Company vs Sleep</span>{c.map(r=><Bar key={r.label} label={r.label} avg_={r.avg_} diff={r.diff} n={r.n} color="#f472b6"/>)}</div>):null;})()}
                </>
              )}

              {analysisTab==="timing"&&(
                <>
                  {(()=>{const c=corrDuration();return c?(<div style={card}><span style={lbl}>Sleep Duration vs Score</span>{c.map(r=><Bar key={r.label} label={r.label} avg_={r.avg_} n={r.n} color={accent}/>)}</div>):<Empty icon="⏱" msg="Log sleep duration for at least 4 nights."/>;})()}
                  {(()=>{const c=corrSleepTime();return c?(<div style={card}><span style={lbl}>Bedtime vs Sleep Score</span>{c.map(r=><Bar key={r.label} label={r.label} avg_={r.avg_} n={r.n} color={accent2}/>)}</div>):null;})()}
                  {MEDS.map(m=>{
                    const me=entries.filter(([,v])=>v.meds?.[m.name]?.on&&v.meds[m.name]?.doses?.[0]?.time);
                    if(me.length<3)return null;
                    const early=me.filter(([,v])=>{const[h]=v.meds[m.name].doses[0].time.split(":").map(Number);return h<20;}).map(([,v])=>v.sleepScore);
                    const eve=me.filter(([,v])=>{const[h]=v.meds[m.name].doses[0].time.split(":").map(Number);return h>=20&&h<22;}).map(([,v])=>v.sleepScore);
                    const late=me.filter(([,v])=>{const[h]=v.meds[m.name].doses[0].time.split(":").map(Number);return h>=22;}).map(([,v])=>v.sleepScore);
                    const buckets=[{label:"Before 8pm",arr:early},{label:"8–10pm",arr:eve},{label:"After 10pm",arr:late}].filter(b=>b.arr.length>=2);
                    if(buckets.length<2)return null;
                    return(<div key={m.name} style={card}><span style={lbl}>{m.name} — Timing vs Sleep</span>{buckets.map(b=><Bar key={b.label} label={b.label} avg_={fmtAvg(avg(b.arr))} n={b.arr.length} color="#fbbf24"/>)}</div>);
                  })}
                </>
              )}

              {analysisTab==="location"&&(
                <>
                  {(()=>{const c=corrCat("location",SLEEP_LOCATIONS);return c.length?(<div style={card}><span style={lbl}>Sleep Location vs Score</span>{c.map(r=><Bar key={r.label} label={r.label} avg_={r.avg_} diff={r.diff} n={r.n} color="#fbbf24"/>)}</div>):<Empty icon="🏠" msg="Need data from multiple locations to compare."/>;})()}
                  {(()=>{
                    const combos=[];
                    SLEEP_LOCATIONS.forEach(loc=>COMPANY.forEach(comp=>{
                      const m=entries.filter(([,v])=>v.location===loc&&v.company===comp).map(([,v])=>v.sleepScore);
                      const o=entries.filter(([,v])=>!(v.location===loc&&v.company===comp)).map(([,v])=>v.sleepScore);
                      if(m.length>=2&&o.length>=2)combos.push({label:`${loc} + ${comp}`,avg_:fmtAvg(avg(m)),diff:(avg(m)-avg(o)).toFixed(1),n:m.length});
                    }));
                    return combos.length?(<div style={card}><span style={lbl}>Location + Company Combos</span>{combos.sort((a,b)=>Math.abs(parseFloat(b.diff))-Math.abs(parseFloat(a.diff))).map(r=><Bar key={r.label} label={r.label} avg_={r.avg_} diff={r.diff} n={r.n} color="#f472b6"/>)}</div>):null;
                  })()}
                </>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
